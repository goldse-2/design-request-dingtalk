<div class="page-content">
    <div class="container">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
            <a href="studio.html" style="display:inline-flex;align-items:center;gap:6px;background:none;border:1.5px solid #e5e7eb;border-radius:8px;padding:6px 12px;font-size:0.85rem;color:#374151;text-decoration:none">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                返回制作
            </a>
            <h2 style="font-size:1.4rem;font-weight:700;color:#111827">我的图片任务</h2>
        </div>
        
        <!-- 实时队列状态 -->
        <div id="queueStatus" style="display:none;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);border-radius:12px;padding:20px 24px;margin-bottom:20px;color:#fff;box-shadow:0 4px 12px rgba(102,126,234,0.25)">
            <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px">
                <div style="display:flex;align-items:center;gap:16px">
                    <div style="width:48px;height:48px;background:rgba(255,255,255,0.2);border-radius:10px;display:flex;align-items:center;justify-content:center">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    </div>
                    <div>
                        <div style="font-size:0.8rem;opacity:0.9;margin-bottom:4px">当前队列状态</div>
                        <div style="font-size:1.3rem;font-weight:700" id="queueText">正在加载...</div>
                    </div>
                </div>
                <div style="display:flex;gap:20px">
                    <div style="text-align:center">
                        <div style="font-size:1.6rem;font-weight:700" id="queuePending">0</div>
                        <div style="font-size:0.75rem;opacity:0.9">排队中</div>
                    </div>
                    <div style="text-align:center">
                        <div style="font-size:1.6rem;font-weight:700" id="queueProcessing">0</div>
                        <div style="font-size:0.75rem;opacity:0.9">处理中</div>
                    </div>
                    <div style="text-align:center">
                        <div style="font-size:1.6rem;font-weight:700;color:#dcfce7" id="estimateTime">-</div>
                        <div style="font-size:0.75rem;opacity:0.9">预计等待</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="taskLoading" style="color:#9ca3af;padding:40px 0;text-align:center">加载中...</div>
        <div id="taskList" style="display:flex;flex-direction:column;gap:14px"></div>
        <div id="taskEmpty" class="lib-empty" hidden>还没有提交过任务</div>
        <div id="taskNeedLogin" class="lib-empty" hidden>请先登录钉钉账号查看任务</div>
    </div>
</div>
