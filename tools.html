<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>更多功能 - 作图中心</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="style.css">
    <style>
        .tools-page { background:#f3f4f6; }
        .tools-container { max-width:1600px; margin:0 auto; padding:28px 28px 40px; }
        .tools-header { display:flex; align-items:flex-end; justify-content:space-between; gap:20px; margin-bottom:20px; }
        .tools-header h1 { font-size:1.45rem; line-height:1.25; color:#111827; }
        .tools-header p { margin-top:5px; color:#64748b; font-size:.84rem; }
        .tools-count { flex:none; color:#64748b; font-size:.76rem; font-weight:700; }
        .tools-workspace { display:grid; grid-template-columns:minmax(330px, 390px) minmax(0, 1fr); gap:20px; align-items:start; }
        .tool-operations { min-height:calc(100vh - 120px); padding:20px; border:1px solid #e2e8f0; border-radius:8px; background:#fff; }
        .tool-panel-title { display:flex; align-items:center; gap:10px; margin-bottom:18px; }
        .tool-panel-icon { display:grid; place-items:center; width:34px; height:34px; border-radius:7px; background:#0f766e; color:#fff; }
        .tool-panel-icon svg { width:18px; height:18px; }
        .tool-panel-title strong { display:block; color:#111827; font-size:1rem; }
        .tool-panel-title span { display:block; margin-top:2px; color:#94a3b8; font-size:.7rem; }
        .tool-field { margin-bottom:15px; }
        .tool-label { display:block; margin-bottom:7px; color:#1f2937; font-size:.8rem; font-weight:700; }
        .tool-label em { color:#dc2626; font-style:normal; }
        .tool-input, .tool-select { width:100%; height:42px; padding:0 11px; border:1px solid #cbd5e1; border-radius:7px; background:#fff; color:#111827; font-size:.84rem; outline:none; }
        .tool-input:focus, .tool-select:focus { border-color:#0f766e; box-shadow:0 0 0 3px rgba(15,118,110,.1); }
        .condition-row { display:grid; grid-template-columns:112px minmax(0, 1fr); gap:8px; }
        .operator-row { display:grid; grid-template-columns:112px minmax(0, 1fr); gap:8px; margin-top:8px; }
        .type-options { display:grid; grid-template-columns:repeat(3, 1fr); gap:7px; }
        .type-option { position:relative; }
        .type-option input { position:absolute; opacity:0; pointer-events:none; }
        .type-option span { display:flex; align-items:center; justify-content:center; min-height:38px; padding:6px; border:1px solid #cbd5e1; border-radius:7px; color:#475569; font-size:.76rem; font-weight:700; cursor:pointer; }
        .type-option input:checked + span { border-color:#0f766e; background:#ecfdf5; color:#0f766e; box-shadow:inset 0 0 0 1px #0f766e; }
        .year-row { display:grid; grid-template-columns:1fr 18px 1fr; align-items:center; gap:6px; }
        .year-row > span { color:#94a3b8; text-align:center; }
        .tool-actions { display:grid; grid-template-columns:1fr auto; gap:8px; margin-top:20px; }
        .tool-search-btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; min-height:44px; border:0; border-radius:7px; background:#111827; color:#fff; font-size:.86rem; font-weight:800; cursor:pointer; }
        .tool-search-btn:hover { background:#0f172a; }
        .tool-search-btn svg { width:17px; height:17px; }
        .tool-reset-btn { min-width:70px; border:1px solid #cbd5e1; border-radius:7px; background:#fff; color:#475569; font-size:.8rem; font-weight:700; cursor:pointer; }
        .official-link { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-top:10px; padding:10px 11px; border-left:3px solid #0f766e; background:#f0fdfa; color:#0f766e; font-size:.76rem; font-weight:700; text-decoration:none; }
        .official-link svg { flex:none; width:15px; height:15px; }
        .recent-searches { margin-top:22px; padding-top:18px; border-top:1px solid #e5e7eb; }
        .recent-title { display:flex; align-items:center; justify-content:space-between; margin-bottom:9px; color:#475569; font-size:.75rem; font-weight:800; }
        .recent-title button { border:0; background:none; color:#94a3b8; font-size:.7rem; cursor:pointer; }
        .recent-list { display:flex; flex-direction:column; gap:6px; }
        .recent-item { display:flex; align-items:center; justify-content:space-between; gap:10px; width:100%; padding:8px 9px; border:1px solid #e5e7eb; border-radius:6px; background:#f8fafc; color:#334155; text-align:left; cursor:pointer; }
        .recent-item span { min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:.74rem; }
        .recent-item small { flex:none; color:#94a3b8; font-size:.66rem; }
        .recent-empty { color:#94a3b8; font-size:.74rem; }
        .tool-catalog { min-height:calc(100vh - 120px); overflow:hidden; border:1px solid #e2e8f0; border-radius:8px; background:#fff; }
        .catalog-heading { display:flex; align-items:center; justify-content:space-between; gap:16px; min-height:54px; padding:0 20px; border-bottom:1px solid #e5e7eb; }
        .catalog-heading h2 { position:relative; padding-left:11px; color:#111827; font-size:.92rem; }
        .catalog-heading h2::before { content:""; position:absolute; left:0; top:2px; bottom:2px; width:3px; border-radius:2px; background:#0f766e; }
        .catalog-heading span { color:#94a3b8; font-size:.72rem; }
        .tool-grid { display:grid; grid-template-columns:repeat(3, minmax(0, 1fr)); gap:12px; padding:16px 20px 20px; }
        .tool-card { display:grid; grid-template-columns:40px minmax(0, 1fr) auto; align-items:start; gap:11px; min-height:116px; padding:15px; border:1px solid #cbd5e1; border-radius:7px; background:#f8fafc; color:inherit; text-decoration:none; cursor:pointer; }
        .tool-card:hover, .tool-card.active { border-color:#0f766e; background:#f0fdfa; }
        .tool-card-icon { display:grid; place-items:center; width:40px; height:40px; border-radius:7px; background:#0f766e; color:#fff; }
        .tool-card-icon svg { width:21px; height:21px; }
        .tool-card h3 { margin:1px 0 5px; color:#111827; font-size:.88rem; }
        .tool-card p { color:#64748b; font-size:.72rem; line-height:1.55; }
        .tool-status { margin-top:2px; padding:3px 7px; border-radius:999px; background:#dcfce7; color:#047857; font-size:.64rem; font-weight:800; }
        .catalog-empty { margin:0 20px 20px; padding:16px; border-top:1px solid #eef2f7; color:#94a3b8; font-size:.76rem; }
        @media (max-width:1050px) {
            .tools-workspace { grid-template-columns:minmax(300px, 360px) minmax(0, 1fr); }
            .tool-grid { grid-template-columns:repeat(2, minmax(0, 1fr)); }
        }
        @media (max-width:760px) {
            .tools-container { padding:20px 14px 32px; }
            .tools-header { align-items:flex-start; flex-direction:column; gap:8px; }
            .tools-workspace { grid-template-columns:1fr; }
            .tool-operations, .tool-catalog { min-height:0; }
            .tool-grid { grid-template-columns:1fr; }
        }
    </style>
</head>
<body class="has-sidebar tools-page">
<aside class="sidebar">
    <div class="sidebar-top">
        <a href="index.html" class="sidebar-logo" title="作图中心"><img src="/favicon.svg" alt="" style="width:36px;height:36px;border-radius:50%"></a>
        <nav class="sidebar-nav">
            <a href="index.html" class="sidebar-link" title="提交需求"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg></a>
            <a href="studio.html" class="sidebar-link" title="图片制作"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></a>
            <a href="library.html" class="sidebar-link" title="资料库"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></a>
            <a href="admin.html" class="sidebar-link" title="管理台"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></a>
            <a href="tools.html" class="sidebar-link active" title="更多功能"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a4 4 0 0 0-5.4-5.4l2.4 2.4-2.8 2.8-2.4-2.4a4 4 0 0 0 5.4 5.4l6.7 6.7a2 2 0 0 0 2.8-2.8z"/><path d="m5 16-2 2 3 3 2-2"/></svg></a>
        </nav>
    </div>
    <div class="sidebar-bottom"></div>
</aside>

<main class="page-content">
    <div class="tools-container">
        <header class="tools-header">
            <div><h1>更多功能</h1><p>常用查询和日常处理工具</p></div>
            <div class="tools-count">1 个工具可用</div>
        </header>

        <div class="tools-workspace">
            <section class="tool-operations" aria-labelledby="patentPanelTitle">
                <div class="tool-panel-title">
                    <div class="tool-panel-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-4-4"/><path d="M8 11h6M11 8v6"/></svg></div>
                    <div><strong id="patentPanelTitle">查询美国专利</strong><span>US Patent Search</span></div>
                </div>

                <form id="patentSearchForm">
                    <div class="tool-field">
                        <label class="tool-label" for="patentField">查询字段 <em>*</em></label>
                        <div class="condition-row">
                            <select class="tool-select" id="patentField">
                                <option value="everything">关键词</option>
                                <option value="title">专利标题</option>
                                <option value="number">专利号 / 公开号</option>
                                <option value="assignee">申请人 / 专利权人</option>
                                <option value="inventor">发明人</option>
                            </select>
                            <input class="tool-input" id="patentQuery" type="text" maxlength="160" placeholder="输入关键词、专利号或名称" required>
                        </div>
                        <div class="operator-row">
                            <select class="tool-select" id="patentOperator" aria-label="条件关系">
                                <option value="AND">并且 AND</option>
                                <option value="OR">或者 OR</option>
                                <option value="NOT">排除 NOT</option>
                            </select>
                            <input class="tool-input" id="patentQuery2" type="text" maxlength="160" placeholder="第二个条件（可选）">
                        </div>
                    </div>

                    <div class="tool-field">
                        <span class="tool-label">专利类型</span>
                        <div class="type-options">
                            <label class="type-option"><input type="radio" name="patentType" value="all" checked><span>全部</span></label>
                            <label class="type-option"><input type="radio" name="patentType" value="utility"><span>发明专利</span></label>
                            <label class="type-option"><input type="radio" name="patentType" value="design"><span>外观设计</span></label>
                        </div>
                    </div>

                    <div class="tool-field">
                        <label class="tool-label" for="patentYearStart">公开年份（可选）</label>
                        <div class="year-row">
                            <input class="tool-input" id="patentYearStart" type="number" min="1790" max="2030" placeholder="开始年份">
                            <span>至</span>
                            <input class="tool-input" id="patentYearEnd" type="number" min="1790" max="2030" placeholder="结束年份" aria-label="结束年份">
                        </div>
                    </div>

                    <div class="tool-actions">
                        <button class="tool-search-btn" type="submit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-4-4"/></svg>查询美国专利</button>
                        <button class="tool-reset-btn" type="button" id="patentReset">清空</button>
                    </div>
                </form>

                <a class="official-link" href="https://ppubs.uspto.gov/basic/" target="_blank" rel="noopener noreferrer"><span>打开 USPTO 官方专利查询</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3h7v7"/><path d="M10 14 21 3"/><path d="M21 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5"/></svg></a>

                <div class="recent-searches">
                    <div class="recent-title"><span>最近查询</span><button type="button" id="clearPatentHistory">清除记录</button></div>
                    <div class="recent-list" id="patentRecentList"></div>
                </div>
            </section>

            <section class="tool-catalog" aria-labelledby="toolCatalogTitle">
                <div class="catalog-heading"><h2 id="toolCatalogTitle">查询工具</h2><span>点击工具后在左侧操作</span></div>
                <div class="tool-grid">
                    <button class="tool-card active" type="button" id="patentToolCard">
                        <span class="tool-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-4-4"/><path d="M8 8h6M8 11h4M8 14h5"/></svg></span>
                        <span><h3>查询美国专利</h3><p>按关键词、专利号、申请人、发明人或标题查找美国公开专利和专利申请。</p></span>
                        <span class="tool-status">可用</span>
                    </button>
                </div>
                <div class="catalog-empty">后续新增的小工具会继续显示在这里。</div>
            </section>
        </div>
    </div>
</main>

<script>
const PATENT_HISTORY_KEY = 'us_patent_recent_searches';
const patentForm = document.getElementById('patentSearchForm');
const patentQuery = document.getElementById('patentQuery');
const patentRecentList = document.getElementById('patentRecentList');

function cleanPatentTerm(value) {
    return String(value || '').trim().replace(/["']/g, ' ').replace(/\s+/g, ' ');
}

function formatPatentTerm(field, value) {
    const term = cleanPatentTerm(value);
    if (!term) return '';
    const wrapped = term.includes(' ') ? `(${term})` : term;
    if (field === 'title') return `title:${wrapped}`;
    if (field === 'assignee') return `assignee:${wrapped}`;
    if (field === 'inventor') return `inventor:${wrapped}`;
    return wrapped;
}

function patentFormState() {
    return {
        field: document.getElementById('patentField').value,
        query: cleanPatentTerm(patentQuery.value),
        operator: document.getElementById('patentOperator').value,
        query2: cleanPatentTerm(document.getElementById('patentQuery2').value),
        type: document.querySelector('input[name="patentType"]:checked')?.value || 'all',
        yearStart: document.getElementById('patentYearStart').value,
        yearEnd: document.getElementById('patentYearEnd').value,
        searchedAt: Date.now()
    };
}

function buildPatentUrl(state) {
    const parts = ['country:US', formatPatentTerm(state.field, state.query)];
    if (state.query2) parts.push(`${state.operator} ${formatPatentTerm(state.field, state.query2)}`);
    if (state.type === 'utility') parts.push('type:PATENT');
    if (state.type === 'design') parts.push('type:DESIGN');
    if (state.yearStart) parts.push(`after:publication:${state.yearStart}0101`);
    if (state.yearEnd) parts.push(`before:publication:${state.yearEnd}1231`);
    const url = new URL('https://patents.google.com/');
    url.searchParams.set('q', parts.filter(Boolean).join(' '));
    return url.toString();
}

function readPatentHistory() {
    try { return JSON.parse(localStorage.getItem(PATENT_HISTORY_KEY) || '[]').slice(0, 5); }
    catch { return []; }
}

function savePatentSearch(state) {
    const history = readPatentHistory().filter(item => item.query !== state.query || item.field !== state.field);
    localStorage.setItem(PATENT_HISTORY_KEY, JSON.stringify([state, ...history].slice(0, 5)));
    renderPatentHistory();
}

function restorePatentSearch(state) {
    document.getElementById('patentField').value = state.field || 'everything';
    patentQuery.value = state.query || '';
    document.getElementById('patentOperator').value = state.operator || 'AND';
    document.getElementById('patentQuery2').value = state.query2 || '';
    const typeInput = document.querySelector(`input[name="patentType"][value="${state.type || 'all'}"]`);
    if (typeInput) typeInput.checked = true;
    document.getElementById('patentYearStart').value = state.yearStart || '';
    document.getElementById('patentYearEnd').value = state.yearEnd || '';
    patentQuery.focus();
}

function renderPatentHistory() {
    const history = readPatentHistory();
    patentRecentList.innerHTML = '';
    if (!history.length) {
        patentRecentList.innerHTML = '<div class="recent-empty">暂无查询记录</div>';
        return;
    }
    history.forEach(state => {
        const button = document.createElement('button');
        button.className = 'recent-item';
        button.type = 'button';
        button.innerHTML = `<span>${escapePatentHtml(state.query)}</span><small>${patentFieldName(state.field)}</small>`;
        button.addEventListener('click', () => restorePatentSearch(state));
        patentRecentList.appendChild(button);
    });
}

function patentFieldName(field) {
    return ({ everything:'关键词', title:'标题', number:'专利号', assignee:'申请人', inventor:'发明人' })[field] || '关键词';
}

function escapePatentHtml(value) {
    return String(value || '').replace(/[&<>"']/g, character => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' })[character]);
}

patentForm.addEventListener('submit', event => {
    event.preventDefault();
    const state = patentFormState();
    if (!state.query) { patentQuery.focus(); return; }
    if (state.yearStart && state.yearEnd && Number(state.yearStart) > Number(state.yearEnd)) {
        const value = state.yearStart;
        state.yearStart = state.yearEnd;
        state.yearEnd = value;
    }
    savePatentSearch(state);
    window.open(buildPatentUrl(state), '_blank', 'noopener,noreferrer');
});

document.getElementById('patentReset').addEventListener('click', () => {
    patentForm.reset();
    patentQuery.focus();
});
document.getElementById('clearPatentHistory').addEventListener('click', () => {
    localStorage.removeItem(PATENT_HISTORY_KEY);
    renderPatentHistory();
});
document.getElementById('patentToolCard').addEventListener('click', () => {
    document.querySelector('.tool-operations').scrollIntoView({ behavior:'smooth', block:'start' });
    patentQuery.focus({ preventScroll:true });
});
renderPatentHistory();
</script>
</body>
</html>
