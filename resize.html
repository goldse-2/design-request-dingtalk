<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>尺寸修改 - 作图中心</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="style.css">
    <style>
        .resize-page .resize-container { padding-bottom: 50px; }
        h1 { margin: 0; font-size: 22px; }
        .subtitle { margin: 7px 0 20px; color: #6b7280; font-size: 14px; }
        .resize-tab { display: inline-flex; align-items: center; padding: 7px 20px; border-radius: 7px; color: #6b7280; text-decoration: none; font-size: .88rem; font-weight: 500; }
        .resize-tab:hover { background: #fff; color: #111827; }
        .resize-tab.active { background: #fff; color: #111827; font-weight: 600; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
        .resize-task-tab { margin-left: 8px; }
        .workspace { display: grid; grid-template-columns: 340px minmax(0, 1fr); min-height: 560px; background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; overflow: hidden; }
        .controls { padding: 24px; border-right: 1px solid #e5e7eb; }
        .preview { min-width: 0; padding: 24px; display: flex; flex-direction: column; }
        .section-title { margin: 0 0 18px; font-size: 16px; }
        label { display: block; margin: 16px 0 7px; color: #374151; font-size: 13px; font-weight: 700; }
        select { width: 100%; height: 42px; padding: 0 10px; border: 1px solid #d1d5db; border-radius: 6px; background: #fff; color: #111827; font-size: 14px; }
        .drop { min-height: 165px; display: grid; place-items: center; margin-top: 18px; padding: 20px; border: 1.5px dashed #aeb6c4; border-radius: 7px; text-align: center; color: #4b5563; cursor: pointer; }
        .drop:hover, .drop.dragging { border-color: #4f46e5; background: #f7f7ff; }
        .drop-icon { display: block; margin-bottom: 9px; color: #6366f1; font-size: 28px; }
        .drop small { display: block; margin-top: 5px; color: #9ca3af; }
        .status { min-height: 42px; margin-top: 14px; padding: 10px 11px; border-radius: 6px; background: #f3f4f6; color: #6b7280; font-size: 12px; line-height: 1.65; }
        .status.error { background: #fef2f2; color: #b91c1c; }
        .status.ready { background: #ecfdf5; color: #047857; }
        .status.resize-submit-progress { padding:11px 12px; border:1px solid #dbe2ea; background:#f8fafc; color:#334155; }
        .resize-submit-progress-head { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:8px; }
        .resize-submit-progress-head strong { min-width:0; overflow:hidden; color:#111827; font-size:.78rem; text-overflow:ellipsis; white-space:nowrap; }
        .resize-submit-progress-head span { flex:none; color:#475569; font-size:.74rem; font-weight:800; }
        .resize-submit-progress-track { width:100%; height:8px; overflow:hidden; border-radius:4px; background:#e5e7eb; }
        .resize-submit-progress-bar { display:block; height:100%; border-radius:4px; background:#111827; transition:width .18s ease; }
        .resize-submit-progress-meta { display:flex; justify-content:space-between; gap:12px; margin-top:8px; color:#64748b; font-size:.68rem; }
        .status.resize-submit-progress.is-success { border-color:#a7f3d0; background:#ecfdf5; }
        .status.resize-submit-progress.is-success .resize-submit-progress-bar { background:#059669; }
        .status.resize-submit-progress.is-error { border-color:#fecaca; background:#fef2f2; }
        .status.resize-submit-progress.is-error .resize-submit-progress-bar { background:#dc2626; }
        #downloadBtn { width: 100%; height: 44px; margin-top: 16px; border: 0; border-radius: 6px; background: #4f46e5; color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; }
        #downloadBtn:disabled { background: #c7c9f8; cursor: not-allowed; }
        .preview-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        .size-badge { padding: 4px 9px; border-radius: 5px; background: #eef2ff; color: #4338ca; font-size: 12px; font-weight: 700; }
        .canvas-wrap { flex: 1; min-height: 430px; display: grid; place-items: center; overflow: auto; padding: 20px; border-radius: 6px; background-color: #eef0f3; background-image: linear-gradient(45deg,#e3e5e8 25%,transparent 25%),linear-gradient(-45deg,#e3e5e8 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#e3e5e8 75%),linear-gradient(-45deg,transparent 75%,#e3e5e8 75%); background-size: 20px 20px; background-position: 0 0,0 10px,10px -10px,-10px 0; }
        canvas { display: none; width: min(100%, 1464px); height: auto; background: #fff; box-shadow: 0 2px 10px rgba(15,23,42,.15); }
        .empty { color: #9ca3af; font-size: 14px; }
        @media (max-width: 780px) { .studio-tabs { max-width: 100%; overflow-x: auto; } .resize-tab { white-space: nowrap; padding: 7px 12px; } .workspace { grid-template-columns: 1fr; } .controls { border-right: 0; border-bottom: 1px solid #e5e7eb; } .canvas-wrap { min-height: 260px; } }
    </style>
</head>

    <div class="page-content">
    <main class="container resize-container">
        <div class="studio-type-hero">把图片放进去调整尺寸吧。<span class="studio-type-cursor">_</span></div>
        <h1>图片制作</h1>
        <p class="subtitle">调整生成图片的最终像素尺寸</p>
        <nav class="studio-tabs">
            <a class="resize-tab" href="studio.html">自由模式</a>
            <a class="resize-tab" href="studio.html?mode=program">图生图模式</a>
            <a class="resize-tab active" href="resize.html">尺寸修改</a>
            <a class="resize-tab resize-task-tab" href="studio-tasks.html">我的任务 →</a>
        </nav>
        <div class="workspace">
            <section class="controls">
                <h2 class="section-title">转换规格</h2>
                <label for="sizePreset">尺寸规则</label>
                <select id="sizePreset">
                    <option value="aplus1464">A+：1464 × 600</option>
                    <option value="wide2560">宽图：2560 × 1024 → 1464 × 600</option>
                    <option value="square2k">2K：2048 × 2048 → 1600 × 1600</option>
                </select>
                <label class="drop" id="dropZone" for="imageInput">
                    <span><span class="drop-icon">↑</span><span id="dropText">上传 1464 × 600 图片</span><small>JPG、PNG、WebP，最大 20 MB</small></span>
                </label>
                <input id="imageInput" type="file" accept="image/jpeg,image/png,image/webp" hidden>
                <div class="status" id="status">等待上传图片</div>
                <button id="downloadBtn" disabled>下载 1464 × 600 图片</button>
            </section>
            <section class="preview">
                <div class="preview-head"><h2 class="section-title" style="margin:0">输出预览</h2><span class="size-badge" id="outputBadge">1464 × 600</span></div>
                <div class="canvas-wrap"><div class="empty" id="emptyPreview">上传图片后显示转换结果</div><canvas id="canvas"></canvas></div>
            </section>
        </div>
    </main>
