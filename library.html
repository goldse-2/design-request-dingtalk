<style>
.lib-tab {
    padding: 7px 18px;
    border: none;
    background: transparent;
    font-size: 0.88rem;
    color: #6b7280;
    cursor: pointer;
    border-bottom: 2.5px solid transparent;
    margin-bottom: -2px;
    font-weight: 500;
    transition: color .15s, border-color .15s;
}
.lib-tab.active, .lib-tab:hover {
    color: #6366f1;
    border-bottom-color: #6366f1;
}
.library-submit-progress { margin-top:10px; padding:11px 12px; border:1px solid #dbe2ea; border-radius:8px; background:#f8fafc; color:#334155; }
.library-submit-progress-head { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:8px; }
.library-submit-progress-head strong { min-width:0; overflow:hidden; color:#111827; font-size:.78rem; text-overflow:ellipsis; white-space:nowrap; }
.library-submit-progress-head span { flex:none; color:#475569; font-size:.74rem; font-weight:800; }
.library-submit-progress-track { width:100%; height:8px; overflow:hidden; border-radius:4px; background:#e5e7eb; }
.library-submit-progress-bar { display:block; height:100%; border-radius:4px; background:#111827; transition:width .18s ease; }
.library-submit-progress-meta { display:flex; justify-content:space-between; gap:12px; margin-top:8px; color:#64748b; font-size:.68rem; }
.library-submit-progress.is-success { border-color:#a7f3d0; background:#ecfdf5; }
.library-submit-progress.is-success .library-submit-progress-bar { background:#059669; }
.library-submit-progress.is-retrying { border-color:#fde68a; background:#fffbeb; }
.library-submit-progress.is-retrying .library-submit-progress-bar { background:#d97706; }
.library-submit-progress.is-error { border-color:#fecaca; background:#fef2f2; }
.library-submit-progress.is-error .library-submit-progress-bar { background:#dc2626; }
</style>
</head>

<div class="page-content">
    <div class="container">
        <!-- Category view -->
        <div id="libCatView">
            <div style="margin-bottom:20px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px">
                <div>
                    <h2 style="font-size:1.4rem;font-weight:700;color:#111827">资料库</h2>
                    <p style="color:#6b7280;font-size:0.9rem;margin-top:4px">选择分类查看产品、素材和文件</p>
                </div>

            </div>
            <div id="libTabBar" style="display:flex;gap:6px;margin-bottom:20px;border-bottom:2px solid #f3f4f6;padding-bottom:0">
                <button class="lib-tab active" data-tab="all" onclick="switchLibTab('all')">全部</button>
                <button class="lib-tab" data-tab="product" onclick="switchLibTab('product')">产品</button>
                <button class="lib-tab" data-tab="model" onclick="switchLibTab('model')">模特图片素材</button>
                <button class="lib-tab" data-tab="manual" onclick="switchLibTab('manual')">说明书</button>
            </div>
            <div id="libLoading" style="color:#9ca3af;padding:40px 0;text-align:center">加载中...</div>
            <div id="libCatGrid" style="display:flex;flex-direction:column;gap:32px"></div>
            <div id="libEmpty" class="lib-empty" hidden>暂无资料，请联系管理员上传</div>
            <div class="shoot-request-bottom-wrap">
                <button type="button" class="shoot-request-btn" onclick="openShootModal()">+ 提交拍摄 / 素材需求</button>
            </div>
        </div>

        <!-- Product view (drill-in) -->
        <div id="libProdView" hidden>
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
                <button onclick="showCatView()" style="display:inline-flex;align-items:center;gap:6px;background:none;border:1.5px solid #e5e7eb;border-radius:8px;padding:6px 12px;font-size:0.85rem;color:#374151;cursor:pointer">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                    返回
                </button>
                <span id="libProdBreadcrumb" style="font-size:0.85rem;color:#9ca3af"></span>
                <h2 id="libProdTitle" style="font-size:1.2rem;font-weight:700;color:#111827"></h2>
            </div>
            <div id="libProdGrid" class="library-grid"></div>
        </div>
    </div>
</div>

<div id="shootModal" class="modal" hidden>
    <div class="modal-content" style="max-width:480px">
        <button class="modal-close" type="button" onclick="closeShootModal()">×</button>
        <h3 style="margin-bottom:14px">提交拍摄 / 素材需求</h3>
        <label style="font-size:0.85rem;color:#374151;display:block;margin-bottom:6px">产品名称 / 型号</label>
        <input id="shootProduct" type="text" placeholder="如：S10充电款" style="width:100%;padding:9px 12px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:0.875rem;outline:none;margin-bottom:14px">
        <label style="font-size:0.85rem;color:#374151;display:block;margin-bottom:6px">需求描述</label>
        <textarea id="shootDesc" placeholder="说明拍摄角度、数量、用途等" style="width:100%;min-height:80px;padding:9px 12px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:0.875rem;outline:none;resize:vertical;margin-bottom:14px"></textarea>
        <label style="font-size:0.85rem;color:#374151;display:block;margin-bottom:6px">参考图片 <span style="color:#9ca3af">（最多 3 张，单张 ≤ 8MB）</span></label>
        <div id="shootDrop" tabindex="0" style="border:1.5px dashed #d1d5db;border-radius:8px;padding:16px;text-align:center;font-size:0.85rem;color:#9ca3af;cursor:pointer;outline:none">
            点击选择图片
            <input type="file" id="shootInput" accept="image/*" multiple style="display:none">
        </div>
        <div id="shootThumbs" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:10px"></div>
        <div id="shootStatus" style="font-size:0.85rem;color:#6b7280;margin-top:10px"></div>
        <div style="display:flex;gap:8px;margin-top:16px">
            <button type="button" onclick="closeShootModal()" style="flex:1;padding:9px;border:1.5px solid #e5e7eb;background:#fff;color:#374151;border-radius:8px;cursor:pointer;font-size:0.875rem">取消</button>
            <button type="button" id="shootSubmit" onclick="submitShoot()" style="flex:1;padding:9px;border:none;background:#111827;color:#fff;border-radius:8px;cursor:pointer;font-size:0.875rem;font-weight:600">提交需求</button>

        <a href="/api/dingtalk-auth" class="btn-dingtalk-qr">使用钉钉登录</a>
    </div>

<script>
let allCategories = {};

async function loadLibrary() {
    try {
        const res = await fetch('/api/library');
        const json = await res.json();
        document.getElementById('libLoading').hidden = true;

        const visibleCategories = Object.fromEntries(
            Object.entries(json.categories || {})
                .filter(([, products]) => Object.keys(products || {}).length)
                .sort(([a], [b]) => a.localeCompare(b, 'zh-CN'))
        );
        if (!json.ok || Object.keys(visibleCategories).length === 0) {
            document.getElementById('libEmpty').hidden = false;
            return;
        }

        allCategories = visibleCategories;
        const grid = document.getElementById('libCatGrid');
        grid.innerHTML = '';

        for (const [cat, products] of Object.entries(allCategories)) {
            const section = document.createElement('div');

            const titleRow = document.createElement('div');
            titleRow.className = 'library-section-title';
            titleRow.textContent = cat;
            section.appendChild(titleRow);

            const prodGrid = document.createElement('div');
            prodGrid.className = 'library-grid';

            const productEntries = Object.entries(products)
                .filter(([, files]) => Array.isArray(files) && files.length)
                .sort(([a], [b]) => a.localeCompare(b, 'zh-CN'));
            if (!productEntries.length) continue;

            for (const [product, files] of productEntries) {
                const cover = files.find(f => /\.(png|jpg|jpeg|webp|gif)$/i.test(f.name)) || files[0];
                const isImg = /\.(png|jpg|jpeg|webp|gif)$/i.test(cover.name);
                const card = document.createElement('div');
                card.className = 'lib-card';
                card.style.cursor = 'pointer';
                card.innerHTML = `
                    <div class="lib-card-img-wrap" style="position:relative">
                        ${isImg ? `<img src="/api/library-file/${encodeURIComponent(cover.key)}?v=${encodeURIComponent(cover.version || cover.size || '')}" alt="${esc(product)}" loading="lazy">` : `<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="1.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>`}
                        <span style="position:absolute;bottom:6px;right:8px;background:rgba(0,0,0,0.5);color:#fff;font-size:0.7rem;padding:2px 7px;border-radius:10px">${files.length} 个文件</span>
                    </div>
                    <div class="lib-card-body">
                        <div class="lib-card-name">${esc(product)}</div>
                        <div class="lib-card-meta" style="color:#6366f1">点击查看 →</div>
                    </div>`;
                card.addEventListener('click', () => openProduct(cat, product, files));
                prodGrid.appendChild(card);
            }
            section.appendChild(prodGrid);
            grid.appendChild(section);
        }
    } catch (e) {
        document.getElementById('libLoading').textContent = '加载失败：' + e.message;
    }
}

function openProduct(cat, product, files) {
    document.getElementById('libCatView').hidden = true;
    document.getElementById('libProdView').hidden = false;
    document.getElementById('libProdBreadcrumb').textContent = cat + ' /';
    document.getElementById('libProdTitle').textContent = product;

    const grid = document.getElementById('libProdGrid');
    grid.innerHTML = '';
    const sortedFiles = [...files].sort((a, b) => String(a.name || '').localeCompare(String(b.name || ''), 'zh-CN'));
    for (const file of sortedFiles) {
        const isImage = /\.(png|jpg|jpeg|webp|gif)$/i.test(file.name);
        const card = document.createElement('div');
        card.className = 'lib-card';
        card.innerHTML = `
            <div class="lib-card-img-wrap">
                ${isImage ? `<img src="/api/library-file/${encodeURIComponent(file.key)}?v=${encodeURIComponent(file.version || file.size || '')}" alt="${esc(file.name)}" loading="lazy" onclick="openLibraryPreview('/api/library-file/${encodeURIComponent(file.key)}?v=${encodeURIComponent(file.version || file.size || '')}','${esc(file.name)}')" style="cursor:zoom-in">` : `<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`}
            </div>
            <div class="lib-card-body">
                <div class="lib-card-name">${esc(file.name)}</div>
                <div class="lib-card-meta">${formatSize(file.size)}</div>
                <a class="lib-card-dl" href="/api/library-file/${encodeURIComponent(file.key)}?dl=1&amp;v=${encodeURIComponent(file.version || file.size || '')}" download="${esc(file.name)}">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    下载
                </a>
            </div>`;
        grid.appendChild(card);
    }
}

function openLibraryPreview(src, name) {
    const previousOverflow = document.body.style.overflow;
    document.body.style.overflow = 'hidden';
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:9999;display:flex;align-items:center;justify-content:center;padding:28px';
    overlay.innerHTML = `
        <button type="button" style="position:absolute;top:18px;right:24px;background:rgba(255,255,255,0.12);color:#fff;border:none;border-radius:50%;width:36px;height:36px;font-size:24px;line-height:1;cursor:pointer">×</button>
        <div style="max-width:94vw;max-height:90vh;text-align:center">
            <img src="${src}" alt="${esc(name)}" style="max-width:94vw;max-height:82vh;object-fit:contain;border-radius:10px;background:#fff;box-shadow:0 20px 60px rgba(0,0,0,0.35)">
            <div style="margin-top:12px;color:#fff;font-size:0.9rem;word-break:break-all">${esc(name)}</div>
        </div>`;
    const closePreview = () => {
        document.body.style.overflow = previousOverflow;
        overlay.remove();
    };
    overlay.querySelector('button').onclick = closePreview;
    overlay.addEventListener('click', e => { if (e.target === overlay) closePreview(); });
    document.addEventListener('keydown', function onEsc(e) {
        if (e.key === 'Escape') {
            closePreview();
            document.removeEventListener('keydown', onEsc);
        }
    });
    document.body.appendChild(overlay);
}

function showCatView() {
    document.getElementById('libProdView').hidden = true;
    document.getElementById('libCatView').hidden = false;
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function formatSize(b) {
    if (!b) return '';
    if (b < 1024) return b + ' B';
    if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
    return (b/1048576).toFixed(1) + ' MB';
}

let shootImages = [];

function getLibUser() {
    const stored = sessionStorage.getItem('dt_user') || localStorage.getItem('dt_user');
    if (!stored) return null;
    try { const u = JSON.parse(stored); return u.unionId ? u : null; } catch { return null; }
}

function openShootModal() {
    if (!getLibUser()) {
        const m = document.getElementById('shootLoginModal');
        m.removeAttribute('hidden'); m.classList.add('modal--visible');
        return;
    }
    shootImages = [];
    document.getElementById('shootProduct').value = '';
    document.getElementById('shootDesc').value = '';
    document.getElementById('shootThumbs').innerHTML = '';
    document.getElementById('shootStatus').textContent = '';
    const m = document.getElementById('shootModal');
    m.removeAttribute('hidden'); m.classList.add('modal--visible');
}

function closeShootModal() {
    const m = document.getElementById('shootModal');
    m.classList.remove('modal--visible'); m.hidden = true;
}
function openShootModalFromUrl() {
    const url = new URL(window.location.href);
    if (url.searchParams.get('shoot') !== '1') return;
    openShootModal();
    url.searchParams.delete('shoot');
    window.history.replaceState({}, '', url.pathname + url.search + url.hash);
}

function addShootImages(files) {
    Array.from(files).forEach(file => {
        if (shootImages.length >= 3) { alert('最多上传 3 张图片'); return; }
        if (!file.type.startsWith('image/')) { alert('请上传图片：' + file.name); return; }
        if (file.size > 8 * 1024 * 1024) { alert('单张图片不能超过 8MB：' + file.name); return; }
        const reader = new FileReader();
        reader.onload = ev => {
            shootImages.push({ name: file.name, mimeType: file.type, dataUrl: ev.target.result });
            renderShootThumbs();
        };
        reader.readAsDataURL(file);
    });
}

function renderShootThumbs() {
    const wrap = document.getElementById('shootThumbs');
    wrap.innerHTML = '';
    shootImages.forEach((f, i) => {
        const div = document.createElement('div');
        div.style.cssText = 'position:relative;width:70px;height:70px';
        div.innerHTML = `<img src="${f.dataUrl}" style="width:70px;height:70px;object-fit:cover;border-radius:8px;border:1px solid #e5e7eb"><button type="button" data-i="${i}" style="position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,0.6);color:#fff;border:none;cursor:pointer;font-size:11px;line-height:18px;padding:0">×</button>`;
        div.querySelector('button').addEventListener('click', () => { shootImages.splice(i, 1); renderShootThumbs(); });
        wrap.appendChild(div);
    });
}

(function initShootUpload() {
    const drop = document.getElementById('shootDrop');
    const input = document.getElementById('shootInput');
    if (!drop || !input) return;
    drop.addEventListener('click', () => input.click());
    drop.addEventListener('dragover', e => { e.preventDefault(); drop.style.borderColor = '#111827'; });
    drop.addEventListener('dragleave', () => drop.style.borderColor = '#d1d5db');
    drop.addEventListener('drop', e => { e.preventDefault(); drop.style.borderColor = '#d1d5db'; addShootImages(e.dataTransfer.files); });
    drop.addEventListener('paste', e => {
        const item = Array.from(e.clipboardData.items).find(x => x.type.startsWith('image/'));
        if (item) { e.preventDefault(); addShootImages([item.getAsFile()]); }
    });
    input.addEventListener('change', e => { addShootImages(e.target.files); e.target.value = ''; });
})();

async function submitShoot() {
    const product = document.getElementById('shootProduct').value.trim();
    const desc = document.getElementById('shootDesc').value.trim();
    const status = document.getElementById('shootStatus');
    const btn = document.getElementById('shootSubmit');
    const user = getLibUser();
    if (!user) { alert('请先登录'); return; }
    if (!product) { status.textContent = '请填写产品名称'; status.style.color = '#ef4444'; return; }
    if (!desc && !shootImages.length) { status.textContent = '请填写描述或上传参考图'; status.style.color = '#ef4444'; return; }

    btn.disabled = true;
    status.style.color = '#6b7280';
    let lastPercent = shootImages.length ? 3 : 72;
    renderLibrarySubmitProgress(status, shootImages.length ? `准备上传 ${shootImages.length} 张参考图片` : '正在准备拍摄需求', lastPercent, shootImages.length ? '图片上传完成后自动创建需求' : '拍摄资料已经准备', shootImages.length ? `已上传 0/${shootImages.length}` : '资料已准备');
    try {
        const photoKeys = [];
        if (shootImages.length) {
            for (let index = 0; index < shootImages.length; index += 1) {
                const img = shootImages[index];
                const blob = await fetch(img.dataUrl).then(r => r.blob());
                const uploaded = await uploadLibraryShootImage(
                    blob,
                    img.name,
                    ratio => {
                        lastPercent = 4 + ((index + ratio) / shootImages.length) * 78;
                        renderLibrarySubmitProgress(status, `正在上传参考图片 ${index + 1}/${shootImages.length}`, lastPercent, img.name, `已上传 ${Math.floor(index + ratio)}/${shootImages.length}`);
                    },
                    ({ attempt, maxAttempts, error }) => renderLibrarySubmitProgress(status, `上传中断，正在自动重试 ${attempt}/${maxAttempts}`, lastPercent, error.message, `图片 ${index + 1}/${shootImages.length}`, 'retrying')
                );
                photoKeys.push(uploaded);
            }
        }
        renderLibrarySubmitProgress(status, '图片上传完成，正在创建拍摄需求', 90, '正在确认需求已进入拍摄队列', shootImages.length ? `已上传 ${shootImages.length}/${shootImages.length}` : '资料已提交');
        const data = {
            fileName: '白底拍摄需求',
            submitTime: new Date().toLocaleString('zh-CN'),
            basicInfo: { '型号': product, '图片数量': shootImages.length + ' 张' },
            images: photoKeys.map((k, i) => ({ 序号: '图' + (i + 1), 区域: '拍摄参考', 图片要求: desc, photoKey: k.key, photoName: k.name })),
            directPhotoKeys: photoKeys,
            directDesc: desc
        };
        const res = await fetch('/api/submit', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ taskType: '白底拍摄需求', remarks: desc, submitter: user, data })
        });
        const json = await res.json();
        if (!res.ok || !json.ok) throw new Error(json.error || res.status);
        renderLibrarySubmitProgress(status, '拍摄需求提交完成', 100, '需求已进入拍摄队列', '已完成', 'success');
        setTimeout(closeShootModal, 1200);
    } catch (e) {
        renderLibrarySubmitProgress(status, '拍摄需求提交失败', lastPercent, e.message, '图片和内容已保留', 'error');
        btn.disabled = false;
    }
}

function libraryProgressEsc(value) {
    return String(value || '').replace(/[&<>"']/g, character => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[character]);
}

function renderLibrarySubmitProgress(status, title, percent, detail, countText, state = '') {
    const value = Math.max(0, Math.min(100, Math.round(Number(percent) || 0)));
    status.className = `library-submit-progress${state ? ` is-${state}` : ''}`;
    status.style.color = '';
    status.innerHTML = `<div class="library-submit-progress-head"><strong>${libraryProgressEsc(title)}</strong><span>${value}%</span></div><div class="library-submit-progress-track" role="progressbar" aria-label="提交进度" aria-valuemin="0" aria-valuemax="100" aria-valuenow="${value}"><span class="library-submit-progress-bar" style="width:${value}%"></span></div><div class="library-submit-progress-meta"><span>${libraryProgressEsc(detail)}</span><span>${libraryProgressEsc(countText)}</span></div>`;
}

async function uploadLibraryShootImage(blob, name, onProgress, onRetry) {
    const uploadId = crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(36).slice(2)}`;
    let lastError;
    for (let attempt = 1; attempt <= 3; attempt += 1) {
        try {
            return await new Promise((resolve, reject) => {
                const form = new FormData();
                form.append('file', blob, name);
                form.append('prefix', 'shoot/ref');
                form.append('uploadId', uploadId);
                const request = new XMLHttpRequest();
                request.open('POST', '/api/studio-upload');
                request.timeout = 120000;
                request.upload.onprogress = event => { if (event.lengthComputable) onProgress(event.loaded / event.total); };
                request.onload = () => {
                    let result = {};
                    try { result = JSON.parse(request.responseText || '{}'); } catch {}
                    if (request.status >= 200 && request.status < 300 && result.ok) { onProgress(1); resolve({ key: result.key, name: result.name }); return; }
                    const error = new Error(result.error || '图片上传失败');
                    error.status = request.status;
                    reject(error);
                };
                request.onerror = () => { const error = new Error('网络连接中断'); error.status = 0; reject(error); };
                request.ontimeout = () => { const error = new Error('图片上传超时'); error.status = 408; reject(error); };
                request.send(form);
            });
        } catch (error) {
            lastError = error;
            const retryable = !error.status || error.status === 408 || error.status === 429 || error.status >= 500;
            if (!retryable || attempt === 3) throw error;
            onRetry?.({ attempt: attempt + 1, maxAttempts: 3, error });
            await new Promise(resolve => setTimeout(resolve, attempt * 700));
        }
    }
    throw lastError;
}

let _libActiveTab = 'all';
// Tab map: which KV category names belong to each tab
const LIB_TAB_MAP = {
    product: ['美甲灯','工具','护理','家居','其他'],
    model: ['模特'],
    manual: ['说明书'],
};

function switchLibTab(tab) {
    _libActiveTab = tab;
    document.querySelectorAll('.lib-tab').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === tab);
    });
    const grid = document.getElementById('libCatGrid');
    if (!grid) return;
    // Show/hide sections based on tab
    Array.from(grid.children).forEach(section => {
        const title = section.querySelector('.library-section-title');
        if (!title) return;
        const cat = title.textContent.trim();
        let show = false;
        if (tab === 'all') {
            show = true;
        } else {
            const matchCats = LIB_TAB_MAP[tab] || [];
            // Fuzzy: manual = contains '说明书', model = '模特', product = everything else
            if (tab === 'manual') show = cat.includes('说明书');
            else if (tab === 'model') show = cat.includes('模特');
            else if (tab === 'product') show = !cat.includes('模特') && !cat.includes('说明书');
        }
        section.style.display = show ? '' : 'none';
    });
}
