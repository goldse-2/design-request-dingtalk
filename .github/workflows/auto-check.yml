name: Auto Check Studio Tasks

on:
  schedule:
    - cron: '*/3 * * * *'  # 每3分钟运行一次
  workflow_dispatch:  # 允许手动触发

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger auto-check
        run: |
          curl -s "https://design-request-dingtalk.pages.dev/api/studio-check-overdue"
          echo "Auto-check triggered at $(date)"
