name: Manual Check Studio Tasks

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger auto-check
        run: |
          curl --fail --silent --show-error "https://design-request-dingtalk.pages.dev/api/studio-check-overdue?rpaOnly=1"
          echo "Auto-check triggered at $(date)"
