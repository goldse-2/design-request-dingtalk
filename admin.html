<div class="page-content">

<!-- AI自动化审核 -->
<div id="studioSection" class="container" hidden style="margin-top:0;padding-top:0">
    <div style="margin:32px 0 16px;display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap">
        <div>
            <h2 style="font-size:1.2rem;font-weight:700;color:#111827">AI自动化审核</h2>
            <p style="color:#6b7280;font-size:0.85rem;margin-top:2px">待处理的图片制作需求</p>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button type="button" id="studioBatchPauseBtn" style="font-size:0.84rem;color:#b45309;background:#fff;border:1px solid #f59e0b;border-radius:7px;padding:8px 14px;cursor:pointer;font-weight:600">一键挂起</button>
            <button type="button" id="studioBatchSendBtn" style="font-size:0.84rem;color:#fff;background:#4f46e5;border:1px solid #4f46e5;border-radius:7px;padding:8px 14px;cursor:pointer;font-weight:600">一键发送</button>
        </div>
    </div>
    <div id="studioAdminContent"></div>
    <div style="margin-top:28px;border-top:1px solid #e5e7eb;padding-top:18px">
        <button type="button" id="studioHistoryToggle" onclick="toggleStudioHistory()" style="display:flex;align-items:center;gap:8px;background:none;border:none;cursor:pointer;font-size:1rem;font-weight:700;color:#111827;padding:0">
            <span id="studioHistoryArrow" style="display:inline-block;transition:transform 0.2s">▶</span>
            历史记录
            <span style="font-size:0.8rem;font-weight:400;color:#9ca3af">（已完成并通知）</span>
        </button>
        <div id="studioHistoryContent" hidden style="margin-top:16px"></div>
    </div>
</div>

<!-- 密码保护层 -->
<div id="authWall" class="auth-wall">
    <div class="auth-box">
        <h2>管理台登录</h2>
        <p>请输入管理密码</p>
        <input type="password" id="authInput" class="auth-input" placeholder="输入密码" autocomplete="current-password">
        <div id="authError" class="auth-error" hidden>密码错误，请重试</div>
        <button id="authBtn" class="auth-btn">进入管理台</button>
    </div>
</div>

<!-- 管理台主体 -->
<div id="adminMain" class="container" hidden>
    <header class="admin-header">
        <div>
            <h1>作图需求管理台</h1>
            <p>查看、完成或驳回提交的需求</p>
        </div>
        <button type="button" id="adminLogoutBtn" class="btn btn--secondary">退出管理</button>
    </header>

    <div class="stats-row" id="stats"></div>

    <div class="filter-bar">
        <select id="filterSelect" class="filter-select">
            <option value="all" selected>全部需求</option>
            <option value="图片">图片</option>
            <option value="视频">视频</option>
            <option value="设计">设计</option>
        </select>
    </div>

    <div id="loadingState" class="admin-loading">加载中...</div>
    <div id="emptyState" class="empty-state" hidden>
        <div style="font-size:2.5rem">📭</div>
        <p>暂无提交记录</p>
    </div>

    <div id="submissionsList" class="submissions-list"></div>

    <div style="margin-top:28px;border-top:1px solid #e5e7eb;padding-top:18px">
        <button type="button" id="historyToggle" onclick="toggleHistory()" style="display:flex;align-items:center;gap:8px;background:none;border:none;cursor:pointer;font-size:1rem;font-weight:700;color:#111827;padding:0">
            <span id="historyArrow" style="display:inline-block;transition:transform 0.2s">▶</span>
            历史提交记录
            <span style="font-size:0.8rem;font-weight:400;color:#9ca3af">（已完成 / 已驳回，保留 45 天）</span>
        </button>
        <div id="historyContent" hidden style="margin-top:16px"></div>
    </div>
</div>

<!-- 资料库管理 -->
<div id="librarySection" class="container" hidden style="margin-top:0;padding-top:0">
    <div style="margin:32px 0 16px;display:flex;align-items:center;justify-content:space-between">
        <div>
            <h2 style="font-size:1.2rem;font-weight:700;color:#111827">资料库管理</h2>
            <p style="color:#6b7280;font-size:0.85rem;margin-top:2px">上传和管理产品图、素材文件，按分类和文件夹分组</p>
        </div>
        <a href="library.html" target="_blank" style="font-size:0.8rem;color:#6366f1;text-decoration:none">查看资料库 →</a>
    </div>

    <div style="display:flex;gap:8px;margin-bottom:14px">
        <button class="lib-admin-tab active" data-cat="" onclick="setLibAdminTab(this,'')">全部</button>
        <button class="lib-admin-tab" data-cat="product" onclick="setLibAdminTab(this,'product')">产品</button>
        <button class="lib-admin-tab" data-cat="model" onclick="setLibAdminTab(this,'model')">模特图片素材</button>
        <button class="lib-admin-tab" data-cat="manual" onclick="setLibAdminTab(this,'manual')">说明书</button>
    </div>
    <div style="background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,0.07);margin-bottom:16px">
        <div style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-bottom:16px">
            <div style="min-width:140px">
                <label style="font-size:0.8rem;color:#374151;display:block;margin-bottom:4px">分类</label>
                <select id="libCategory" style="width:100%;padding:8px 12px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:0.875rem;outline:none;background:#fff"></select>
            </div>
            <div style="flex:1;min-width:140px">
                <label style="font-size:0.8rem;color:#374151;display:block;margin-bottom:4px">产品名称（选文件夹时自动填入）</label>
                <input id="libProduct" type="text" placeholder="如：S10充电款" style="width:100%;padding:8px 12px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:0.875rem;outline:none">
            </div>
            <button id="libUploadBtn" type="button" style="padding:8px 18px;background:#6366f1;color:#fff;border:none;border-radius:8px;font-size:0.875rem;font-weight:600;cursor:pointer;white-space:nowrap">选择文件</button>
            <button id="libFolderBtn" type="button" style="padding:8px 18px;background:#fff;color:#6366f1;border:1.5px solid #6366f1;border-radius:8px;font-size:0.875rem;font-weight:600;cursor:pointer;white-space:nowrap">📁 选择文件夹</button>
            <input type="file" id="libFileInput" accept="image/*,.pdf,.zip,.ai,.psd" multiple style="display:none">
            <input type="file" id="libFolderInput" accept="image/*,.pdf,.zip,.ai,.psd" multiple webkitdirectory style="display:none">
        </div>
        <div id="libUploadPreview" class="lib-upload-grid" style="display:none"></div>
        <button id="libConfirmBtn" hidden style="margin-top:12px;padding:9px 24px;background:#16a34a;color:#fff;border:none;border-radius:8px;font-size:0.875rem;font-weight:600;cursor:pointer">✓ 确认上传</button>
        <div id="libUploadStatus" style="font-size:0.85rem;color:#6b7280;margin-top:8px"></div>
    </div>

    <div id="libAdminContent"></div>
</div>

<!-- 案例管理 -->
<div id="examplesAdminSection" class="container" hidden style="margin-top:0;padding-top:0">
    <button id="examplesToggleBtn" type="button" style="width:100%;margin:32px 0 12px;background:#fff;border:none;border-radius:12px;padding:16px 20px;box-shadow:0 1px 4px rgba(0,0,0,0.07);display:flex;align-items:center;justify-content:space-between;cursor:pointer;text-align:left">
        <div>
            <h2 style="font-size:1.2rem;font-weight:700;color:#111827">案例管理</h2>
            <p style="color:#6b7280;font-size:0.85rem;margin-top:2px">管理图片制作右侧示例画廊中用户上传的案例</p>
        </div>
        <span style="display:flex;align-items:center;gap:14px">

<footer class="site-footer">
    <p>© 2025 作图中心 &nbsp;·&nbsp; <a href="index.html">提交需求</a> &nbsp;·&nbsp; <a href="library.html">资料库</a></p>

<div id="etaModal" class="modal" hidden>
    <div class="modal-content">
        <button class="modal-close" id="etaModalClose">×</button>
        <h3>设置预计完成时间</h3>
        <p style="color:#6b7280;font-size:0.9rem;margin-bottom:12px">选择预计完成时间，会通过钉钉通知提交人（不会从列表移除）</p>
        <select id="etaInput" class="filter-select" style="width:100%;margin-bottom:12px">

            <option value="3-5天">3-5天</option>
            <option value="8-15天">8-15天</option>
        </select>

        <div style="display:flex;gap:8px;margin-top:16px">

<!-- 排序弹窗 -->
<div id="sortModal" class="modal" hidden>
    <div class="modal-content" style="max-width:500px">
        <button class="modal-close" id="sortModalClose">×</button>
        <h3>任务排序</h3>
        <p style="color:#6b7280;font-size:0.9rem;margin-bottom:16px">使用 ↑ ↓ 调整任务顺序，排在前面的优先处理</p>
        <div id="sortList" style="max-height:400px;overflow-y:auto"></div>
        <div style="display:flex;gap:8px;margin-top:16px">
            <button id="sortCloseBtn" class="btn-secondary" style="flex:1">取消</button>
            <button id="sortSaveBtn" class="btn-primary" style="flex:1">保存</button>
        </div>
    </div>
</div>

<!-- 驳回原因弹窗 -->
<div id="rejectModal" class="modal" hidden>
    <div class="modal-content">
        <button class="modal-close" id="rejectModalClose">×</button>
        <h3>驳回需求</h3>
        <p style="color:#6b7280;font-size:0.9rem;margin-bottom:12px">请输入驳回原因（可选，会通过钉钉通知提交人）</p>
        <textarea id="rejectReason" class="textarea" placeholder="驳回原因..." style="min-height:80px"></textarea>
        <div style="margin-top:12px">
            <label style="font-size:0.85rem;color:#374151;display:block;margin-bottom:6px">附图（可选，支持多张）</label>
            <div id="rejectPasteZone" tabindex="0" style="border:1.5px dashed #d1d5db;border-radius:8px;padding:12px 16px;text-align:center;font-size:0.85rem;color:#9ca3af;cursor:pointer;outline:none;transition:border-color 0.15s">
                点击选择 或 Ctrl+V 粘贴图片（可多张）
                <input type="file" id="rejectImageInput" accept="image/*" multiple style="display:none">
            </div>
            <div id="rejectImagePreview" style="margin-top:8px;display:flex;flex-wrap:wrap;gap:8px"></div>
        </div>
        <div style="display:flex;gap:8px;margin-top:16px">
            <button id="rejectCancelBtn" class="btn-secondary" style="flex:1">取消</button>
            <button id="rejectConfirmBtn" class="btn-danger" style="flex:1">确认驳回</button>
        </div>
    </div>
</div>


<script>
function setLibAdminTab(btn, tabKey) {
    document.querySelectorAll('.lib-admin-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const catSel = document.getElementById('libCategory');
    if (!catSel) return;
    // Map tab key to a default category value
    const map = { product: '美甲灯', model: '模特', manual: '说明书' };
    if (tabKey && map[tabKey]) {
        catSel.value = map[tabKey];
        // If the value didn't match, try to find the option
        if (catSel.value !== map[tabKey]) {
            Array.from(catSel.options).forEach(o => {
                if (o.text.includes(tabKey === 'manual' ? '说明书' : tabKey === 'model' ? '模特' : '')) {
                    catSel.value = o.value;
                }
            });
        }
    }
    // Filter the admin grid sections
    const container = document.getElementById('libAdminContent');
    if (!container) return;
    container.querySelectorAll('.lib-admin-section').forEach(sec => {
        const title = sec.querySelector('h3,h4,.lib-section-title');
        if (!title) { sec.style.display = ''; return; }
        const cat = title.textContent.trim();
        let show = true;
        if (tabKey === 'manual') show = cat.includes('说明书');
        else if (tabKey === 'model') show = cat.includes('模特');
        else if (tabKey === 'product') show = !cat.includes('模特') && !cat.includes('说明书');
        sec.style.display = show ? '' : 'none';
    });
}
</script>
